<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>namioshi v3 公式配置比較ラボ</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#07111f;color:#edf9ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{width:min(1080px,100%);margin:auto;padding:20px}
    h1{margin:0 0 8px;font-size:clamp(28px,6vw,48px)}
    p{line-height:1.65;color:#b9d7e6}
    .notice{padding:12px 14px;border:1px solid #765d1a;border-radius:14px;background:#251d08;color:#ffe7a5}
    .choices{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
    button{border:1px solid #4f7688;border-radius:999px;background:#102536;color:#eaf8ff;padding:10px 15px;font-weight:700}
    button[aria-pressed="true"]{background:#83e9ff;color:#04121d;border-color:#83e9ff}
    .layout{display:grid;grid-template-columns:minmax(280px,420px) minmax(280px,1fr);gap:18px;align-items:start}
    .canvasWrap{display:flex;justify-content:center;padding:10px;border:1px solid #27495b;border-radius:18px;background:#030b15}
    canvas{display:block;width:min(100%,360px);height:auto;aspect-ratio:9/16;border-radius:12px;border:1px solid #4c7286;background:#03101f}
    .card{padding:16px;border:1px solid #27495b;border-radius:18px;background:#0b1a28}
    h2{margin:0 0 6px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
    th,td{padding:8px 6px;border-bottom:1px solid #213e4d;text-align:left;vertical-align:top}
    th{width:48%;color:#aacddd;font-weight:600}
    code{font-size:12px;overflow-wrap:anywhere;color:#b9efff}
    .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;font-size:13px;color:#b9d7e6}
    .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px}
    .beacon{background:#f7ffce}.glass{background:#8beaff}.tap{background:#ffbd6a}
    @media(max-width:760px){main{padding:14px}.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <h1>namioshi v3 公式配置比較ラボ</h1>
    <p>候補の配置と同じ条件で計算した比較値を確認するための開発用ページです。本番ゲームには読み込まれません。</p>
    <p class="notice"><strong>採用候補は未決定です。</strong> 数字だけで自動選択せず、iPhone実機での見やすさと遊びやすさを確認してから人が決めます。</p>
    <div id="choices" class="choices" aria-label="配置候補"></div>
    <div class="layout">
      <div>
        <div class="canvasWrap"><canvas id="preview" width="360" height="640" aria-label="配置候補のプレビュー"></canvas></div>
        <div class="legend"><span><i class="dot beacon"></i>ビーコン</span><span><i class="dot glass"></i>ガラス片</span><span><i class="dot tap"></i>共通3タップ地点</span></div>
      </div>
      <section class="card" aria-live="polite">
        <h2 id="title"></h2>
        <p id="summary"></p>
        <table><tbody id="metrics"></tbody></table>
        <p>表示中のビーコンは10秒の基準移動を繰り返しています。数値は121地点と56到達時刻で再計算した比較用の値です。</p>
      </section>
    </div>
  </main>
  <script type="module" src="./layout-lab.js"></script>
</body>
</html>
