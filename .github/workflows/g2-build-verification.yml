name: G2 Build Verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: g2-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
          - 22

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Show runtime
        run: node --version

      - name: Rebuild dist
        shell: bash
        run: |
          set +e
          npm run build > g2-build.log 2>&1
          status=$?
          cat g2-build.log
          exit "$status"

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: g2-build-node-${{ matrix.node-version }}
          path: g2-build.log
          if-no-files-found: error
          retention-days: 1

      - name: Run unit tests
        run: npm test

      - name: Check layout analysis snapshot
        run: npm run analyze:layouts

      - name: Check layout decision previews
        run: npm run render:layouts

      - name: Verify source and dist contracts
        run: npm run verify

      - name: Report dist size
        run: npm run size

      - name: Confirm committed dist is reproducible
        run: git diff --exit-code -- dist
