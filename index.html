<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>波押し - EchoTap</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020813;color:#eaf7ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;overscroll-behavior:none}body{position:fixed;inset:0}#app{position:relative;width:100vw;height:100dvh;min-height:100vh;overflow:hidden}canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.screen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:24px;text-align:center;background:radial-gradient(circle at 50% 30%,rgba(26,111,150,.24),rgba(2,8,19,.82) 58%,rgba(0,0,0,.94));z-index:3}.screen.show{display:flex}.panel{width:min(440px,100%);padding:24px 20px;border:1px solid rgba(142,229,255,.24);border-radius:24px;background:rgba(3,13,28,.72);box-shadow:0 0 38px rgba(0,213,255,.14);backdrop-filter:blur(8px)}h1{margin:0 0 8px;font-size:clamp(38px,13vw,56px);letter-spacing:.08em;text-shadow:0 0 22px #37d9ff}p{line-height:1.65;color:#bad9e8}.input{width:100%;font-size:18px;padding:14px 16px;border-radius:16px;border:1px solid rgba(142,229,255,.35);background:rgba(0,0,0,.3);color:white;text-align:center;user-select:text;-webkit-user-select:text}.btn{width:100%;margin-top:14px;padding:15px 18px;border:0;border-radius:18px;background:linear-gradient(135deg,#58f0ff,#7c7bff);color:#03111d;font-weight:800;font-size:18px;box-shadow:0 8px 24px rgba(64,210,255,.22)}.btn:active{transform:translateY(1px)}.btn.secondary{background:rgba(210,242,255,.12);color:#eaf7ff;border:1px solid rgba(142,229,255,.25)}.btn:disabled{opacity:.45}.hud{position:absolute;z-index:2;left:0;right:0;top:env(safe-area-inset-top);display:none;justify-content:space-between;padding:12px 14px;pointer-events:none;font-weight:800;text-shadow:0 0 12px #06101b}.hud.show{display:flex}.pill{padding:8px 10px;border-radius:999px;background:rgba(0,0,0,.28);border:1px solid rgba(142,229,255,.18)}#readyText{font-size:clamp(54px,20vw,96px);font-weight:900;text-shadow:0 0 28px #58f0ff}.small{font-size:13px;color:#9fc1d0}.warn{color:#ffd0d0}.shareText{margin-top:12px;width:100%;min-height:80px;display:none;user-select:text;-webkit-user-select:text;color:#eaf7ff;background:rgba(0,0,0,.3);border:1px solid rgba(142,229,255,.25);border-radius:12px;padding:10px}</style>
</head>
<body>
<div id="app">
<canvas id="game"></canvas>
<div id="hud" class="hud"><div class="pill">スコア <span id="hudScore">0</span></div><div class="pill">残り <span id="hudTime">10.0</span></div><div class="pill">タップ <span id="hudTaps">0</span>/3</div></div>
<section id="home" class="screen show"><div class="panel"><h1>波押し</h1><p>暗い水面に浮かぶビーコンへ、反射して戻る波の線を重ねよう。タップは最大3回、制限時間は10秒。</p><input id="nameInput" class="input" maxlength="20" placeholder="名前（必須）" autocomplete="name"><button id="startBtn" class="btn">開始</button><p id="nameError" class="small warn"></p></div></section>
<section id="ready" class="screen"><div id="readyText">3</div></section>
<section id="result" class="screen"><div class="panel"><h1 style="font-size:42px">RESULT</h1><p>スコア <b id="finalScore">0</b> 点</p><p>ベスト <b id="bestScore">0</b> 点 / プレイ回数 <b id="playCount">0</b></p><p id="rankMsg" class="small"></p><button id="shareBtn" class="btn">シェア</button><button id="againBtn" class="btn secondary">もう一度</button><textarea id="shareText" class="shareText" readonly></textarea></div></section>
<section id="error" class="screen"><div class="panel"><h1>ERROR</h1><p id="errorMsg" class="warn">初期化に失敗しました。</p></div></section>
</div>
<script>
'use strict';
// Constants
const GAME_URL='https://chameleonjp.codeberg.page/echotap/',GAME_SLUG='echotap',SUPABASE_KEY='sb_publishable_drzcy0v97knU6FgjqSgBHw_0A9XPdFM';
const MAX_TAPS=3,PLAY_TIME=10,MAX_ECHOES=24,MAX_PARTICLES=80,MAX_REFLECT=2;
// State
const $=id=>document.getElementById(id);
let canvas=null,ctx=null;
let W=0,H=0,DPR=1,state='HOME',last=0,score=0,taps=0,timeLeft=PLAY_TIME,combo=0,player='',submitted=false,quality=1,frames=0,slow=0;
const echoes=[],beacons=[],obstacles=[],particles=[]; const dom={score:0,time:0,taps:0};
const screens={HOME:$('home'),READY:$('ready'),RESULT:$('result'),ERROR:$('error')};
// Utilities
function dist(x1,y1,x2,y2){return Math.hypot(x1-x2,y1-y2)} function clamp(v,a,b){return Math.max(a,Math.min(b,v))} function rnd(a,b){return a+Math.random()*(b-a)}
function setState(s){state=s;Object.keys(screens).forEach(k=>screens[k].classList.toggle('show',k===s));$('hud').classList.toggle('show',s==='PLAYING')}
// Storage
function storeResult(){let best=+localStorage.echotapBest||0,plays=(+localStorage.echotapPlays||0)+1;if(score>best)best=score;localStorage.echotapBest=best;localStorage.echotapPlays=plays;$('bestScore').textContent=best;$('playCount').textContent=plays}
// Audio
let ac=null;function audio(){try{if(!ac)ac=new (window.AudioContext||window.webkitAudioContext)(); if(ac.state==='suspended')ac.resume()}catch(e){}}
function tone(f,d,type='sine',gain=.045){try{if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(gain,ac.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
const sfx={tap(){tone(180,.08,'triangle',.035)},hit(){tone(520,.12,'sine',.055);setTimeout(()=>tone(780,.08,'sine',.035),35)},result(){tone(330,.14);setTimeout(()=>tone(495,.14),90)}};
// Input
function onDown(e){e.preventDefault();audio(); if(state==='PLAYING')tap(e.clientX,e.clientY)}
document.addEventListener('gesturestart',e=>e.preventDefault());
// Game Flow
function start(){player=$('nameInput').value.trim();if(!player){$('nameError').textContent='名前を入力してください';return}$('nameError').textContent='';audio();ready()}
function ready(){setState('READY');let seq=['3','2','1','START'],i=0;$('readyText').textContent=seq[i];let id=setInterval(()=>{i++; if(i>=seq.length){clearInterval(id);newGame()} else $('readyText').textContent=seq[i]},760)}
function newGame(){score=0;taps=0;timeLeft=PLAY_TIME;combo=0;submitted=false;echoes.length=particles.length=0;initWorld();setState('PLAYING');updateHud(true)}
function finish(){if(state!=='PLAYING')return;setState('RESULT');$('finalScore').textContent=score;storeResult();sfx.result();sendRanking()}
// Physics
function initWorld(){beacons.length=obstacles.length=0;for(let i=0;i<4;i++){let x=rnd(50,W-50),y=rnd(90,H-70),ang=rnd(-.8,.8),len=rnd(70,120);obstacles.push({x,y,len,w:rnd(8,14),a:ang,nx:-Math.sin(ang),ny:Math.cos(ang)})}for(let i=0;i<3;i++)beacons.push({id:i,x:(i+1)*W/4,y:rnd(H*.28,H*.72),vx:rnd(-22,22),vy:rnd(-18,18),radius:16,phase:rnd(0,6.28),hitFlash:0})}
function makeEcho(x,y,ref=0){echoes.push({x,y,r:1,speed:155,age:0,life:2.9,alpha:1,reflectedCount:ref,hitBeaconIds:[],refEdges:{},refObs:{}});while(echoes.length>MAX_ECHOES)echoes.shift()}
function tap(x,y){if(taps>=MAX_TAPS)return;taps++;makeEcho(x,y,0);sfx.tap();updateHud(true)}
function reflect(e){if(e.reflectedCount>=MAX_REFLECT)return;let m=8;if(e.r>Math.abs(e.x)&&!e.refEdges.l){e.refEdges.l=1;makeEcho(-e.x,e.y,e.reflectedCount+1)} if(e.r>Math.abs(W-e.x)&&!e.refEdges.r){e.refEdges.r=1;makeEcho(2*W-e.x,e.y,e.reflectedCount+1)} if(e.r>Math.abs(e.y)&&!e.refEdges.t){e.refEdges.t=1;makeEcho(e.x,-e.y,e.reflectedCount+1)} if(e.r>Math.abs(H-e.y)&&!e.refEdges.b){e.refEdges.b=1;makeEcho(e.x,2*H-e.y,e.reflectedCount+1)}
obstacles.forEach((o,i)=>{if(e.refObs[i])return;let dx=e.x-o.x,dy=e.y-o.y,along=Math.abs(dx*Math.cos(o.a)+dy*Math.sin(o.a)),perp=Math.abs(dx*o.nx+dy*o.ny);if(along<o.len*.55&&Math.abs(perp-e.r)<10){e.refObs[i]=1;makeEcho(e.x+o.nx*perp*2,e.y+o.ny*perp*2,e.reflectedCount+1)}})}
function step(dt){timeLeft-=dt;if(timeLeft<=0){finish();return}beacons.forEach(b=>{b.phase+=dt;b.x+=b.vx*dt+Math.sin(b.phase)*3*dt;b.y+=b.vy*dt+Math.cos(b.phase*.8)*3*dt;if(b.x<b.radius||b.x>W-b.radius)b.vx*=-1;if(b.y<70||b.y>H-b.radius)b.vy*=-1;b.x=clamp(b.x,b.radius,W-b.radius);b.y=clamp(b.y,70,H-b.radius);b.hitFlash=Math.max(0,b.hitFlash-dt*3)});for(let i=echoes.length-1;i>=0;i--){let e=echoes[i];e.age+=dt;e.r+=e.speed*dt;e.alpha=1-e.age/e.life;reflect(e);beacons.forEach(b=>{if(e.hitBeaconIds.includes(b.id))return;let band=10+b.radius*.35;if(Math.abs(dist(e.x,e.y,b.x,b.y)-e.r)<=band){e.hitBeaconIds.push(b.id);let mult=[1,1.3,1.6,2][combo];combo=Math.min(combo+1,3);score+=Math.round(([100,160,240][e.reflectedCount]||240)*mult);b.hitFlash=1;sfx.hit();burst(b.x,b.y);updateHud(true)}});if(e.age>e.life||e.alpha<=0)echoes.splice(i,1)}for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.age+=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.age>p.life)particles.splice(i,1)} if((taps>=MAX_TAPS&&echoes.length===0)||timeLeft<=0)finish()}
function burst(x,y){for(let i=0;i<12;i++)particles.push({x,y,vx:rnd(-70,70),vy:rnd(-70,70),age:0,life:rnd(.35,.75)});while(particles.length>MAX_PARTICLES)particles.shift()}
// Rendering
function draw(){ctx.setTransform(DPR,0,0,DPR,0,0);let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#06182b');g.addColorStop(1,'#01040b');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.lineWidth=1;ctx.strokeStyle='rgba(110,210,255,.08)';for(let y=20;y<H;y+=18){ctx.beginPath();for(let x=0;x<W;x+=28)ctx.lineTo(x,y+Math.sin(x*.025+performance.now()*.001+y)*3);ctx.stroke()}ctx.save();obstacles.forEach(o=>{ctx.translate(o.x,o.y);ctx.rotate(o.a);ctx.fillStyle='rgba(180,235,255,.16)';ctx.strokeStyle='rgba(220,250,255,.34)';ctx.fillRect(-o.len/2,-o.w/2,o.len,o.w);ctx.strokeRect(-o.len/2,-o.w/2,o.len,o.w);ctx.setTransform(DPR,0,0,DPR,0,0)});ctx.restore();ctx.lineCap='round';echoes.forEach(e=>{for(let k=0;k<3;k++){ctx.beginPath();ctx.lineWidth=(k?1:2.2)*quality;ctx.strokeStyle=`rgba(91,232,255,${e.alpha*(k?0.16:0.75)})`;ctx.shadowBlur=k?0:10*quality;ctx.shadowColor='#58f0ff';ctx.arc(e.x,e.y,Math.max(0,e.r-k*15),0,Math.PI*2);ctx.stroke()}});ctx.shadowBlur=0;beacons.forEach(b=>{let rg=ctx.createRadialGradient(b.x,b.y,2,b.x,b.y,45+b.hitFlash*20);rg.addColorStop(0,'rgba(255,255,210,.95)');rg.addColorStop(.28,'rgba(112,246,255,.7)');rg.addColorStop(1,'rgba(112,246,255,0)');ctx.fillStyle=rg;ctx.beginPath();ctx.arc(b.x,b.y,45+b.hitFlash*20,0,Math.PI*2);ctx.fill();ctx.fillStyle='#eaffff';ctx.beginPath();ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);ctx.fill()});particles.forEach(p=>{ctx.fillStyle=`rgba(170,245,255,${1-p.age/p.life})`;ctx.fillRect(p.x,p.y,2,2)})}
function updateHud(force){let now=performance.now();if(!force&&now-dom.time<100)return;dom.time=now;$('hudScore').textContent=score;$('hudTime').textContent=Math.max(0,timeLeft).toFixed(1);$('hudTaps').textContent=taps}
function loop(t){let dt=Math.min((t-last)/1000,.033)||0;last=t;if(state==='PLAYING'){step(dt);updateHud(false)}draw();frames++;if(t-slow>2000){if(frames<70&&DPR>1){window.__lowDpr=true;DPR=1;resize()}quality=frames<80?.65:1;frames=0;slow=t}requestAnimationFrame(loop)}
// Ranking
async function sendRanking(){if(submitted)return;submitted=true;$('rankMsg').textContent='ランキング送信中...';try{let url='https://chameleonjp.supabase.co/rest/v1/ranking_scores';let body={game_slug:GAME_SLUG,player_name:player,score,score_order:'desc',score_unit:'点',score_label:'スコア'};let r=await fetch(url,{method:'POST',headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(body)});if(!r.ok)throw Error(r.status);$('rankMsg').textContent='ランキング送信完了'}catch(e){$('rankMsg').textContent='ランキング送信に失敗しました'}}
// Share
async function share(){let text=`EchoTapで ${score}点！\n反射する波をビーコンに重ねた。\n${GAME_URL}`;try{if(navigator.share)await navigator.share({text});else{await navigator.clipboard.writeText(text);$('rankMsg').textContent='シェア文をコピーしました'}}catch(e){$('shareText').style.display='block';$('shareText').value=text;$('shareText').focus();$('shareText').select()}}
// Boot
function resize(){DPR=window.__lowDpr?1:Math.min(window.devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=Math.floor(W*DPR);canvas.height=Math.floor(H*DPR);canvas.style.width=W+'px';canvas.style.height=H+'px'}
try{canvas=$('game');if(!canvas)throw Error('Canvas not found');ctx=canvas.getContext('2d',{alpha:false});if(!ctx)throw Error('Canvas 2D context unavailable');canvas.addEventListener('pointerdown',onDown,{passive:false});resize();addEventListener('resize',resize);$('startBtn').onclick=start;$('againBtn').onclick=ready;$('shareBtn').onclick=share;requestAnimationFrame(loop)}catch(e){$('errorMsg').textContent='初期化に失敗しました: '+e.message;setState('ERROR')}
</script>
<!--
README / 最終検収コメント
- 1タップで波紋が1つだけ生成される: pointerdownのみを登録し、touchstartを重複登録していません。
- 4回目のタップは無視される: taps>=MAX_TAPSでtap()がreturnします。
- 10秒で必ずRESULTへ移る: PLAY_TIMEを減算しtimeLeft<=0でfinish()します。
- ビーコンに波の線が重なると得点する: Math.abs(distance-r)<=bandで縁判定します。
- 同じ波紋で同じビーコンを二重加点しない: hitBeaconIdsへbeacon.idを記録します。
- 反射波で得点が増える: reflectedCountごとに100/160/240点を使います。
- RESULTで送信は1回だけ: submittedフラグでsendRanking()を一度に制限します。
- シェア文末にURLが入る: share()のテンプレート末尾は https://chameleonjp.codeberg.page/echotap/ です。
- 横スクロールしない: html/body/#appをoverflow:hidden、固定サイズにしています。
- ピンチズームしない: viewport、touch-action:none、gesturestart preventDefaultを設定しています。
-->
</body>
</html>
